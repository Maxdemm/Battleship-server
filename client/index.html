<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Морський Бій - WebDataRocks</title>
    <link href="https://cdn.webdatarocks.com/latest/webdatarocks.min.css" rel="stylesheet"/>
    <script src="https://cdn.webdatarocks.com/latest/webdatarocks.toolbar.min.js"></script>
    <script src="https://cdn.webdatarocks.com/latest/webdatarocks.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { background: #f0f2f5; margin: 30px; }
        .wrapper { max-width: 950px; margin: 0 auto; }
        #scoreboard { background: #fff; padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 25px; font-size: 20px; font-weight: bold; }
        .your-turn { color: #2ecc71; }
        .wait-turn { color: #e67e22; }
        #wdr-component { box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>Морський Бій через Pivot Table</h2>
    
    <div id="scoreboard">
        <span id="status-text" class="wait-turn">З'єднання з сервером...</span>
    </div>

    <div id="wdr-component"></div>
</div>

<script src="app.js"></script>
</body>
</html>
